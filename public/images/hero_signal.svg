<svg width="420" height="420" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coreGradient" x1="154" y1="154" x2="266" y2="266" gradientUnits="userSpaceOnUse">
      <stop stop-color="#69A8FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7BE7FF" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 210) rotate(90) scale(150)">
      <stop stop-color="#7BE7FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7BE7FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="20" y="20" width="380" height="380" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="coreShadow" x="130" y="130" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="12"/>
      <feGaussianBlur stdDeviation="12"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.027451 0 0 0 0 0.066667 0 0 0 0 0.101961 0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <circle cx="210" cy="210" r="132" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" />

  <g filter="url(#softGlow)">
    <circle cx="210" cy="210" r="124" fill="url(#glowGradient)"/>
  </g>

  <circle cx="210" cy="210" r="124" stroke="#7BE7FF" stroke-opacity="0.6" stroke-width="2"/>
  <circle cx="210" cy="210" r="92" stroke="#69A8FF" stroke-opacity="0.65" stroke-width="2"/>
  <circle cx="275" cy="275" r="11" fill="#69A8FF"/>

  <g filter="url(#coreShadow)">
    <rect x="154" y="154" width="112" height="112" rx="34" fill="#142234" stroke="#7BE7FF" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="170" y="170" width="80" height="80" rx="26" fill="url(#coreGradient)"/>
  </g>

  <rect x="178" y="48" width="64" height="32" rx="16" fill="#08101A" fill-opacity="0.86" stroke="#7BE7FF" stroke-opacity="0.2"/>
  <rect x="322" y="194" width="72" height="32" rx="16" fill="#08101A" fill-opacity="0.86" stroke="#7BE7FF" stroke-opacity="0.2"/>
  <rect x="172" y="338" width="76" height="32" rx="16" fill="#08101A" fill-opacity="0.86" stroke="#7BE7FF" stroke-opacity="0.2"/>

  <text x="210" y="70" fill="#C7D2DF" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">UI</text>
  <text x="358" y="216" fill="#C7D2DF" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Web</text>
  <text x="210" y="360" fill="#C7D2DF" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Code</text>
  <text x="210" y="225" fill="#F3F7FB" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">CB</text>
</svg>
